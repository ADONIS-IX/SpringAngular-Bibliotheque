<mat-card class="page-card">
  <mat-card-title>Gestion des utilisateurs</mat-card-title>
  <mat-card-content>
    <p>Créer un nouvel utilisateur administrateur, bibliothécaire ou étudiant.</p>
    <button mat-flat-button color="primary" (click)="ouvrir()">Créer un utilisateur</button>

    <div *ngIf="loading()" class="loading-container">
      <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
    </div>

    <table mat-table [dataSource]="utilisateurs()" class="mat-elevation-z2" *ngIf="!loading() && utilisateurs().length > 0">
      <ng-container matColumnDef="nom">
        <th mat-header-cell *matHeaderCellDef>Nom</th>
        <td mat-cell *matCellDef="let utilisateur">{{ utilisateur.nom }}</td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let utilisateur">{{ utilisateur.email }}</td>
      </ng-container>
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Rôle</th>
        <td mat-cell *matCellDef="let utilisateur">{{ utilisateur.role }}</td>
      </ng-container>
      <ng-container matColumnDef="actif">
        <th mat-header-cell *matHeaderCellDef>Actif</th>
        <td mat-cell *matCellDef="let utilisateur">{{ utilisateur.actif ? 'Oui' : 'Non' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let utilisateur">
          <button mat-icon-button color="primary" (click)="modifier(utilisateur)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="supprimer(utilisateur)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colonnes"></tr>
      <tr mat-row *matRowDef="let row; columns: colonnes;"></tr>
    </table>

    <div *ngIf="!loading() && utilisateurs().length === 0" class="empty-state">
      <p>Aucun utilisateur trouvé.</p>
    </div>
  </mat-card-content>
</mat-card>
