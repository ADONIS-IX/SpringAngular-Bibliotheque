# ── Application ──────────────────────────────────────────────
spring.application.name=bibliotheque
server.port=8080

# ── Base de données (MySQL par défaut, cf. profil "dev" pour H2) ──
spring.datasource.url=jdbc:mysql://localhost:3306/bibliotheque_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=biblio_user
spring.datasource.password=adriano

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=VotreCleSecreteTresLonguePourJWT2026BibliothequeUniversitaireSpringAngular
jwt.expiration=86400000

# ── Règles métier de la bibliothèque ─────────────────────────
biblio.emprunt.duree-jours=14
biblio.emprunt.prolongation-jours=7
biblio.emprunt.max-simultanes=3
biblio.penalite.tarif-journalier=100
biblio.reservation.expiration-heures=48
