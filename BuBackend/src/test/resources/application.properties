# Configuration de test : H2 en mémoire (aucune dépendance MySQL requise pour `mvn test`).
spring.datasource.url=jdbc:h2:mem:test_db;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
jwt.secret=CleSecreteDeTestSuffisammentLonguePourHMACSHA512BibliothequeUniversitaire2026
jwt.expiration=86400000
